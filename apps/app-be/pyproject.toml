[tool.coverage.run]
branch = true
source = [ "src" ]

[tool.coverage.report]
exclude_lines = ['if TYPE_CHECKING:']
show_missing = true

[tool.pytest.ini_options]
addopts = """
 --cov
 --cov-report html:'../../coverage/apps/app-be/html'
 --cov-report xml:'../../coverage/apps/app-be/coverage.xml'
 --html='../../reports/apps/app-be/unittests/html/index.html'
 --junitxml='../../reports/apps/app-be/unittests/junit.xml'
"""

[project]
name = "app_be"
version = "1.0.0"
description = "Automatically generated by Nx."
requires-python = ">=3.9,<4"
readme = 'README.md'
dependencies = [
    "fastapi>=0.128.8",
    "uvicorn[standard]>=0.39.0",
    "requests>=2.32.3",
    "pyyaml>=6.0.3",
    "python-dotenv>=1.2.1",
    "browser-cookie3>=0.20.1",
    "openai>=1.0.0",
    "azure-ai-projects>=2.1.0",
    "azure-identity>=1.19.0",
]


[dependency-groups]
dev = [
  "ruff>=0.8.2",
  "pytest>=8.3.4",
  "pytest-sugar>=1.0.0",
  "pytest-cov>=6.0.0",
  "pytest-html>=4.1.1",
  "httpx>=0.28.1",
]

[build-system]
requires = ["uv_build>=0.8.9,<0.9.0"]
build-backend = "uv_build"

[tool.ruff]
exclude = [
  ".ruff_cache",
  ".svn",
  ".tox",
  ".venv",
  "dist",
]

line-length = 88
indent-width = 4

[tool.ruff.lint]
select = [
  # pycodestyle
  "E",
  # Pyflakes
  "F",
  # pyupgrade
  "UP",
  # flake8-bugbear
  "B",
  # flake8-simplify
  "SIM",
  # isort
  "I",
]
ignore = []

fixable = ["ALL"]
unfixable = []
